name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0"
        required: true
        default: "v1.0"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build app bundle
        working-directory: "Transcription macOS App"
        run: ./script/build_and_run.sh --no-run

      - name: Package app bundle
        working-directory: "Transcription macOS App/dist"
        run: ditto -c -k --keepParent "Transcription macOS.app" "Transcription-macOS-v1.0.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Transcription-macOS
          path: "Transcription macOS App/dist/Transcription-macOS-v1.0.zip"

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build EXE
        working-directory: "Transcription Windows"
        shell: cmd
        run: build_windows_exe.bat

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Build installer
        working-directory: "Transcription Windows"
        shell: cmd
        run: build_windows_installer.bat

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Transcription-Windows
          path: |
            Transcription Windows/dist/Transcription Windows.exe
            Transcription Windows/dist/Transcription-Windows-Setup-v1.0.exe

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Transcriber 1.0
          body: |
            Initial release of Transcriber.

            Assets:
            - macOS SwiftUI app bundle (`Transcription-macOS-v1.0.zip`)
            - Windows setup wizard (`Transcription-Windows-Setup-v1.0.exe`)
            - Windows standalone executable (`Transcription Windows.exe`) with torch, openai-whisper, and ffmpeg bundled

            Notes:
            - The macOS app requires a local Python environment with `torch` and `openai-whisper`.
            - The Windows EXE includes FFmpeg from gyan.dev; review FFmpeg licensing terms before redistribution.
          files: |
            release-assets/Transcription-macOS/Transcription-macOS-v1.0.zip
            release-assets/Transcription-Windows/Transcription-Windows-Setup-v1.0.exe
            release-assets/Transcription-Windows/Transcription Windows.exe
